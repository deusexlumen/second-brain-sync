project:
  name: WikiMD / Kimi Brain (Cyber-Notion Edition)
  description: Diese Datei ist für AI-Coding-Agenten bestimmt. Sie beschreibt die Architektur, Konventionen und visuelle Formatierung dieses Projekts.
  overview: >
    WikiMD ist ein hochstrukturiertes Personal Knowledge Management-System.
    Es nutzt eine hybride Design-Sprache ("Cyber-Notion"), die auf MkDocs 
    Material basiert. Die KI ist dafür verantwortlich, eingehende Rohdaten
    nicht nur zu sortieren, sondern visuell ansprechend mit Grid-Karten, 
    Admonitions und sauberen Backlinks zu formatieren.
  stack:
    generator: MkDocs 1.6.x
    theme: material (MkDocs Material 9.7.x) mit Custom CSS (Cyber-Notion)
    python_env: Lokales .venv-Verzeichnis (PowerShell)
    plugins:
      - search
      - tags
      - roamlinks
      - git-revision-date-localized
      - macros
    markdown_extensions:
      - meta
      - admonition
      - attr_list
      - md_in_html
      - pymdownx.details
      - pymdownx.superfences
      - pymdownx.highlight
    editor: VS Code (empfohlene Extension foam.foam-vscode)
    automation:
      - serve.ps1
      - sync_build.ps1
  directories:
    Wiki/: Quell-Markdown-Dateien (Strukturierung in Sektoren)
    Assets/: Bilder, PDFs
    RAW/: Eingangskorb für Rohdateien (KI-Futter)
    Log/: Verarbeitungshistorie
    stylesheets/: Custom CSS für die visuelle Identität
  conventions:
    frontmatter:
      required: true
      fields:
        title: Anzeigetitel
        date: YYYY-MM-DD
        tags: [tag1, tag2]
    wiki_links:
      syntax: "[[pfad/zur-datei|Anzeigetext]]"
    visual_formatting:
      - "Übersichten MÜSSEN als MkDocs <div class='grid cards' markdown> formatiert werden."
      - "Lange Texte MÜSSEN mit !!! abstract 'Zusammenfassung' beginnen."
      - "Nutze !!! info, !!! danger für Strukturierung."
  safety_notes:
    - Nie Dateien außerhalb des Projekt-Roots verändern.
    - .venv/ und site/ nicht manuell committen.

agents:
  - name: Brain Sync Agent
    role: Autonomer Systemarchitekt und Content-Designer
    trigger:
      - "Kimi, Brain Sync"
      - "Verarbeite mein Wissen"
    prompt: >
      Wenn der Trigger-Befehl erkannt wird, führe die 3-Phasen-Sequenz 
      (Git Pull -> Kognitive Verarbeitung & Visuelles Formatting -> Sync Build)
      autonom, streng nach den system_instructions.md aus.
    tools:
      - git
      - powershell
      - file_system
